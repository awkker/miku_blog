services:
  postgres:
    image: postgres:16-alpine
    container_name: miku-blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-miku}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-miku_secret}
      POSTGRES_DB: ${DB_NAME:-miku_blog}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-miku}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: miku-blog-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-miku_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-miku_redis}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miku-blog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-miku}
      DB_PASSWORD: ${DB_PASSWORD:-miku_secret}
      DB_NAME: ${DB_NAME:-miku_blog}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-miku_redis}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-720h}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4321}
      WEATHER_LOCATION: ${WEATHER_LOCATION:-Shanghai}
      GEOIP_DB_PATH: ${GEOIP_DB_PATH:-}
    command: ['sh', '-c', 'miku-migrate && miku-blog']
    ports:
      - '${BACKEND_PORT:-8080}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8080/api/v1/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miku-blog-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-4321}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost/ || exit 1']
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  redis_data:
